project_id = "billsos"

# ── Auth ─────────────────────────────────────────────────────────────────────

[auth]
site_url = "https://billsos.com"
additional_redirect_urls = [
  "http://localhost:5173/**",
  "http://localhost:8080/**",
  "https://billsos.com/**",
  "https://monitor.dninfo.online/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your HelloData account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your HelloData password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your HelloData magic link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "You've been invited to HelloData"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new HelloData email address"
content_path = "./supabase/templates/email_change.html"

# ── Database ─────────────────────────────────────────────────────────────────

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
default_pool_size = 15
pool_mode = "transaction"

# ── API ───────────────────────────────────────────────────────────────────────

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ── Storage ───────────────────────────────────────────────────────────────────

[storage]
enabled = true
file_size_limit = "50MiB"
